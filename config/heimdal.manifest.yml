version: 0.2
runtime:
  default_backend: ollama
  storage_root: ./storage
  privacy_mode: local_only
ollama:
  base_url: ${OLLAMA_HOST:-http://localhost:11434}
  timeout_seconds: 120
  max_retries: 2
  retry_backoff_seconds: 1.0
model_profiles:
  verifier:
    candidates: [qwen3:4b, qwen2.5:3b, gemma3:4b]
    required_capabilities: [json_output]
  worker:
    candidates: [qwen3:8b, qwen2.5:7b, gemma3:12b]
    required_capabilities: [basic_generation, json_output]
  brain:
    candidates: [qwen3:14b, qwen2.5:14b, cloud:optional]
    required_capabilities: [planning, long_context_smoke]
  coder:
    candidates: [qwen3-coder:30b, qwen2.5-coder:14b]
    required_capabilities: [code_generation, json_output]
runtime_profiles:
  # v0.6.2: hardware-adaptive budgets. The profile name resolves via
  # `heimdal profile detect` (which reads the capability matrix) OR
  # `heimdal profile set <name>` for a manual override. Heimdal ships
  # builtin defaults in hardware/runtime_profile.py; entries here ADD or
  # OVERRIDE specific fields per installation.
  cpu_only: {}
  dev: {}
  single_gpu: {}
  pipeline: {}
  factory: {}
model_roles:
  # v0.6.1: role-to-model assignment with capability gating. preferred is
  # walked in order; the first installed model whose capability-matrix entry
  # satisfies min_capabilities wins. If none match, the role falls back per
  # role_assigner.py rules (rule_based for verifier, disabled for brain,
  # any worker_candidate for worker).
  verifier:
    preferred: [qwen3:4b, qwen2.5:3b, llama3.2:3b]
    min_capabilities: [json_output, semantic_judgment]
  worker:
    preferred: [qwen3:8b, qwen2.5:7b, llama3.2:3b]
    min_capabilities: [basic_generation, json_output]
  brain:
    preferred: [qwen3:14b, qwen2.5:14b]
    min_capabilities: [basic_generation, json_output]
  semantic_verifier:
    preferred: [qwen2.5:7b, qwen3:8b]
    min_capabilities: [json_output, semantic_judgment]
  coder:
    preferred: [qwen3-coder:30b, qwen2.5-coder:14b]
    min_capabilities: [basic_generation, json_output]
scheduler:
  work_preempts_background: true
  dream_enabled: false
  mirror_enabled: false
budgets:
  default_quality_level: B1
  max_repair_iterations: 2
  max_input_tokens: 8000
  max_output_tokens: 2000
retrieval:
  # Truth Vault retrieval limits. top_k caps how many sources enter the
  # Context Packet; min_score drops weak BM25 matches (0.0 = keep all that
  # pass the minimum-overlap relevance gate).
  top_k: 3
  min_score: 0.0
  # No-Guess Gate grounding threshold. A source-required task is treated as
  # ungrounded -- and returns need_input -- unless a retrieved snippet covers
  # at least this fraction of the task's content terms. This rejects an
  # incidental keyword overlap (e.g. a doc that only shares a generic word).
  min_grounding_coverage: 0.5
verifier:
  # Verification gate. rule_based (default) runs only the deterministic
  # verifier. hybrid additionally runs a model-based semantic verifier for
  # B2-B4 tasks, after the rule-based gate passes. The semantic verifier is
  # an extra quality layer and never overrides a deterministic hard fail.
  mode: rule_based
  semantic_model_verifier_enabled: false
  semantic_verifier_model: null
sandbox:
  policy_file: config/sandbox_policy.yml
mirror:
  # Mirror Mode is OFF by default. When enabled, it compares Heimdal's local
  # outputs against an optional cloud/frontier teacher and emits improvement
  # proposals -- it never mutates stable behavior.
  enabled: false
  privacy_mode: local_only
  teacher_provider: null
  teacher_model: null
  daily_token_budget: 0
  max_teacher_calls_per_run: 3
  max_input_tokens_per_call: 8000
  max_output_tokens_per_call: 2000
  redact_before_send: true
  allowed_sources:
    - eval
    - recent
    - failed
    - dream
  store_teacher_outputs: false
  store_diffs: true

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Heimdal
        run: pip install -e .

      # Heimdal runs fully offline; no Ollama server is available on CI, so the
      # runtime falls back to the deterministic offline backend.
      - name: Unit tests
        run: python -m unittest discover -s tests -t .

      - name: Eval suite
        run: heimdal eval run --json
